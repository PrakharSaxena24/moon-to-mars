<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#102b35">
  <title>The Hikone Morning · 彦根の朝</title>
  <meta name="description" content="A physical planning tutorial outside Ryokan Izumi: prepare Watanabe-san's car with two people, then travel from Yokkaichi to Lake Biwa in Hikone.">
  <link rel="stylesheet" href="hikone.css">
</head>
<body class="no-js">
  <main class="hk-app" id="hk-app" data-scene="arrival">
    <header class="hk-utility" id="hk-hud" aria-label="Tutorial controls">
      <div class="hk-place">
        <span class="hk-place-pulse" aria-hidden="true"></span>
        <span id="hk-location">Ryokan Izumi · Yokkaichi</span>
      </div>
      <div class="hk-utility-actions">
        <div class="hk-lang" role="group" aria-label="Language / 言語">
          <button type="button" id="hk-lang-en" aria-pressed="true">EN</button>
          <button type="button" id="hk-lang-ja" aria-pressed="false">日本語</button>
        </div>
        <button type="button" class="hk-sound" id="hk-sound" aria-pressed="false" title="Sound off"><span aria-hidden="true">♪</span><b>Sound off</b></button>
        <a class="hk-exit" href="index.html"><span aria-hidden="true">×</span><b>Exit</b></a>
      </div>
    </header>

    <section class="hk-stage" id="hk-stage" data-phase="arrival" aria-label="Outside Ryokan Izumi in Yokkaichi">
      <div class="hk-world" id="hk-world">
        <div class="hk-sky" aria-hidden="true">
          <span class="hk-moon"></span>
          <span class="hk-cloud hk-cloud-one"></span>
          <span class="hk-cloud hk-cloud-two"></span>
          <span class="hk-dawn"></span>
        </div>
        <div class="hk-mountains" aria-hidden="true"><i></i><i></i><i></i></div>

        <div class="hk-lake" aria-hidden="true">
          <span class="hk-lake-light"></span>
          <span class="hk-water-line hk-water-line-one"></span>
          <span class="hk-water-line hk-water-line-two"></span>
          <span class="hk-water-line hk-water-line-three"></span>
          <span class="hk-reeds hk-reeds-left"></span>
          <span class="hk-reeds hk-reeds-right"></span>
          <span class="hk-tanago-water"><i></i><i></i><i></i></span>
          <span class="hk-suppon-water"><i></i></span>
        </div>

        <div class="hk-home-aquariums" aria-hidden="true">
          <span class="hk-home-lamp"></span>
          <div class="hk-aquarium hk-aquarium-tanago">
            <b>TANAGO <small>タナゴ</small></b>
            <span class="hk-aquarium-water"></span>
            <i></i><i></i><i></i>
          </div>
          <div class="hk-aquarium hk-aquarium-suppon">
            <b>SUPPON <small>スッポン</small></b>
            <span class="hk-aquarium-water"></span>
            <i></i>
          </div>
          <span class="hk-home-shelf"></span>
        </div>

        <div class="hk-yard" aria-hidden="true">
          <span class="hk-gravel"></span>
          <span class="hk-drain"></span>
        </div>
        <div class="hk-road" aria-hidden="true"><i></i><i></i></div>

        <div class="hk-ryokan" aria-hidden="true">
          <span class="hk-roof hk-roof-back"></span>
          <span class="hk-roof hk-roof-front"></span>
          <span class="hk-wall"></span>
          <span class="hk-window hk-window-one"><i></i></span>
          <span class="hk-window hk-window-two"><i></i></span>
          <span class="hk-entry"><i></i><i></i></span>
          <span class="hk-noren">泉</span>
          <span class="hk-sign">旅館 いずみ</span>
          <span class="hk-lantern"></span>
          <span class="hk-stones"></span>
        </div>

        <div class="hk-yard-bench" aria-hidden="true"><i></i><i></i></div>
        <div class="hk-yard-tap" aria-hidden="true"><i></i><i></i><i></i></div>
        <div class="hk-vending" aria-hidden="true">
          <span class="hk-vending-light"></span><i></i><i></i><i></i><b>DRINKS</b>
        </div>

        <div class="hk-car" aria-hidden="true">
          <span class="hk-car-shadow"></span>
          <span class="hk-hatch"><i></i></span>
          <span class="hk-trunk-mouth"></span>
          <span class="hk-car-roof"></span>
          <span class="hk-car-body"></span>
          <span class="hk-car-window hk-car-window-rear"></span>
          <span class="hk-car-window hk-car-window-front"></span>
          <span class="hk-car-pillar"></span>
          <span class="hk-car-handle"></span>
          <span class="hk-headlight"></span>
          <span class="hk-tail-light"></span>
          <span class="hk-bumper"></span>
          <span class="hk-wheel hk-wheel-back"><i></i></span>
          <span class="hk-wheel hk-wheel-front"><i></i></span>
        </div>

        <div class="hk-route-map" aria-hidden="true">
          <span class="hk-route-paper"></span>
          <span class="hk-route-pin hk-route-pin-start" id="hk-route-start">Yokkaichi</span>
          <span class="hk-route-path"><i></i></span>
          <span class="hk-route-car"></span>
          <span class="hk-route-lake"></span>
          <span class="hk-route-pin hk-route-pin-end" id="hk-route-end">Hikone · Lake Biwa</span>
        </div>

        <!-- hikone.js owns the interactive physical layer. It inserts native
             actor, prop and zone buttons here; the CSS contract is documented
             in hikone.css under INTERACTIVE WORLD. -->
        <div class="hk-scene" id="hk-scene"></div>
      </div>

      <div class="hk-clock" id="hk-clock" aria-label="Time">04:45</div>
      <div class="hk-objective" id="hk-objective" role="status" aria-live="polite" aria-atomic="true"></div>
      <div class="hk-dialogue" id="hk-dialogue" aria-live="polite" aria-atomic="true">
        <span class="hk-dialogue-tail" aria-hidden="true"></span>
        <strong id="hk-speaker"></strong>
        <span id="hk-speech"></span>
      </div>
      <div class="hk-hint" id="hk-hint" aria-live="polite"></div>
      <div class="hk-toast" id="hk-toast" role="status" aria-live="polite" aria-atomic="true"></div>
      <div class="hk-actions" id="hk-actions" aria-label="Scene actions"></div>
    </section>

    <div class="hk-live" id="hk-live" role="status" aria-live="polite" aria-atomic="true"></div>
  </main>

  <noscript>This standalone tutorial requires JavaScript. / このチュートリアルにはJavaScriptが必要です。</noscript>
  <script src="hikone.js"></script>
</body>
</html>
