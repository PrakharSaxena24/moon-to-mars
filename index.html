<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ogasawara Rehearsal · 実行前シミュレーター</title>
<meta name="description" content="Rehearse a project before you run it: set roles, authority, info, budget and report routes, press Run, and watch where people stall. Fix the gaps, re-run toward 100. Bilingual EN/JP.">
<link rel="stylesheet" href="style.css">
</head>
<body class="screen-intro">
<div class="wrap">

  <!-- ============ HEADER ============ -->
  <div class="topbar">
    <div class="brand">
      <div class="brand-seal" aria-hidden="true">祭</div>
      <div class="brand-text">
        <div class="sub" data-i18n="subtitle"></div>
        <h1 data-i18n="title"></h1>
        <div class="tag" data-i18n="tagline"></div>
      </div>
    </div>
    <div class="toprow">
      <div class="modesw" id="modesw" role="group">
        <button id="mode-live" class="on" data-mode="live" data-i18n="modeLive" aria-pressed="true"></button>
        <button id="mode-morning" data-mode="morning" data-i18n="modeMorning" aria-pressed="false"></button>
      </div>
      <div class="row2">
        <div class="lang" role="group" aria-label="Language / 言語">
          <button id="lang-en" class="on" data-lang="en" aria-pressed="true">English</button>
          <button id="lang-ja" data-lang="ja" aria-pressed="false">日本語</button>
        </div>
        <button class="btn sm ghost" id="snd-toggle"></button>
        <button class="btn sm ghost" id="cast-open" data-i18n="btnCast"></button>
        <button class="btn sm ghost" id="rules-open" data-i18n="rulesBtn"></button>
        <details class="plan-session" id="plan-session">
          <summary class="btn sm ghost" data-i18n="planSessionSummary"></summary>
          <div class="plan-session-menu">
            <div class="plan-session-status" id="plan-session-status"></div>
            <div class="sr-only" id="plan-session-alert" role="status" aria-live="polite"></div>
            <button class="btn sm primary" type="button" id="plan-resume" data-i18n="planResume"></button>
            <button class="btn sm ghost" type="button" id="plan-new" data-i18n="planNew"></button>
            <button class="btn sm ghost" type="button" id="plan-export" data-i18n="planExport"></button>
            <label class="btn sm ghost plan-import-label" for="plan-import" data-i18n="planImport"></label>
            <input class="sr-only" id="plan-import" type="file" accept="application/json,.json">
          </div>
        </details>
      </div>
    </div>
  </div>

  <!-- ============ LEARNING CONTRACT ============ -->
  <details class="learning-hub card" id="learning-hub">
    <summary class="learning-hub-summary">
      <span class="learning-summary-copy">
        <strong data-i18n="learningHubSummary"></strong>
      </span>
      <span class="learning-summary-meta"><span id="learning-summary-level"></span><span class="disclosure-caret" aria-hidden="true">▾</span></span>
    </summary>
    <div class="learning-hub-body">
      <div class="mission-copy">
        <div class="learning-kicker" data-i18n="missionKicker"></div>
        <h2 id="mission-title" data-i18n="missionTitle"></h2>
        <p data-i18n="missionRole"></p>
        <div class="mission-outcomes" role="list" aria-label="Learning mission outcomes">
          <span role="listitem" data-i18n="missionOutcomeSafe"></span>
          <span role="listitem" data-i18n="missionOutcomeCare"></span>
          <span role="listitem" data-i18n="missionOutcomeTrust"></span>
          <span role="listitem" data-i18n="missionOutcomeLearn"></span>
        </div>
      </div>
      <div class="learning-controls">
        <div class="learning-level-label" id="learning-level-label" data-i18n="learningLevelLabel"></div>
        <div class="learning-levels" id="learning-levels" role="group" aria-labelledby="learning-level-label" aria-describedby="learning-level-desc">
          <button type="button" data-level="learn" data-i18n="levelLearn"></button>
          <button type="button" data-level="practice" data-i18n="levelPractice"></button>
          <button type="button" data-level="challenge" data-i18n="levelChallenge"></button>
        </div>
        <p class="learning-level-desc" id="learning-level-desc"></p>
        <div class="scenario-chip hidden" id="scenario-chip" role="status"></div>
      </div>
      <details class="attempt-history" id="attempt-history-wrap">
        <summary data-i18n="attemptHistoryTitle"></summary>
        <div id="attempt-history"></div>
      </details>
    </div>
  </details>

  <!-- ============ INTRO / CAST (onboarding) ============ -->
  <!-- §W4 cold-open vignette: the hero shows the game in ~15s on the real stage renderer.
       #vig-stage's canvas + loop are created by bootVignette() and DESTROYED by killVignette()
       (never merely hidden) — the caption strip carries the three spec lines + the mini rail row. -->
  <section id="intro">
    <div class="introwrap">
      <div class="intro-hero">
        <div class="intro-kicker" data-i18n="introKicker"></div>
        <h1 data-i18n="title"></h1>
        <p class="intro-lead" data-i18n="introLead"></p>
        <div class="vig" id="vig">
          <div class="vig-stage" id="vig-stage"></div>
          <div class="vig-strip">
            <div class="vig-caption" id="vig-caption" aria-live="polite"></div>
            <div class="vig-rail hidden" id="vig-rail"></div>
          </div>
        </div>
        <div class="intro-cta">
          <button class="btn primary lg" id="intro-start" data-i18n="introStart"></button>
          <button class="btn ghost" id="intro-plan" data-i18n="introPlan"></button>
        </div>
      </div>
      <details class="intro-cast-details" id="intro-cast-wrap">
        <summary class="intro-meet" data-i18n="introMeet"></summary>
        <div id="intro-cast"></div>
      </details>
    </div>
  </section>

  <!-- ============ SETUP ============ -->
  <section id="setup" class="hidden">
    <div class="setup-main">

    <!-- Cluster-first plan overview. The current outcome and its next authoring
         action precede the decorative canvas in source order. -->
    <section class="cluster-shell card" id="cluster-shell" aria-labelledby="cluster-title">
      <div class="cluster-shell-head">
        <div>
          <div class="learning-kicker" data-i18n="clusterKicker"></div>
          <h2 id="cluster-title" data-i18n="clusterTitle"></h2>
          <p class="cluster-intro" data-i18n="clusterIntro"></p>
        </div>
        <div class="cluster-total">
          <span class="cluster-total-label" data-i18n="clusterTotalLabel"></span>
          <strong id="cluster-total-score">0 / 100</strong>
          <span id="cluster-total-state"></span>
        </div>
      </div>
      <div class="plan-clusters" id="plan-clusters"></div>
    </section>

    <!-- §1/§2 PLAN STAGE — setup becomes stage-first: the pre-dawn harbor + a command tray of
         physical decision objects. #plan-stage's canvas + local rAF are created by bootPlanStage()
         and DESTROYED by killPlanStage() (never merely hidden), on every screen transition. -->
    <div class="plan-stage-panel" id="plan-stage-panel">
      <div class="plan-stage-wrap" id="plan-stage-wrap">
        <canvas id="plan-stage" role="img"></canvas>
        <div class="plan-chip" id="plan-chip"></div>
        <div class="plan-halos" id="plan-halos" aria-hidden="true"></div>
        <div class="plan-tokens" id="plan-tokens"></div>
      </div>
      <!-- Visible keyboard equivalent for the code-native canvas pawns. app.js
           populates compact crew-inspection buttons and the localized label. -->
      <details class="plan-roster-details" id="plan-roster-details">
        <summary data-i18n="planRosterSummary"></summary>
        <div class="plan-roster" id="plan-roster" role="group"></div>
      </details>
      <div class="cmd-tray" id="cmd-tray" role="group">
        <div class="tray-hint" id="tray-hint">
          <span id="tray-hint-txt"></span>
          <button class="tray-hint-x" id="tray-hint-x" type="button"></button>
        </div>
        <div class="tray-objs" id="tray-objs"></div>
      </div>
    </div>

    <!-- day selector: while a drawer is open it is covered — the drawer's own #dd-tabs
         header row carries day switching + whole-trip close (deep-check finding) -->
    <details class="day-bar card chapter-browser" id="chapter-browser">
      <summary class="day-bar-h" data-i18n="chapterBrowserSummary"></summary>
      <div class="chapter-browser-body">
        <div id="day-select" class="day-select"></div>
        <div id="tracker" class="tracker"></div>
      </div>
    </details>

    <!-- §4 "All settings" — the Phase-1 receipt rows, org, resources & spend cards remain COMPLETE
         here, collapsed by default; anything the tray does, the fallback can do. -->
    <div class="all-settings collapsed" id="all-settings">
      <button class="all-settings-toggle" id="all-settings-toggle" type="button" aria-expanded="false" aria-controls="all-settings-body">
        <span data-i18n="allSettings"></span><span class="as-caret" aria-hidden="true">▾</span>
      </button>
      <div class="all-settings-body" id="all-settings-body">

        <div class="card">
          <h2 data-i18n="designTitle"></h2>
          <div class="tag" data-i18n="designHint" style="margin:-6px 0 12px;"></div>
          <div class="ed-head" id="ed-head"></div>
          <div id="editors" class="editors"></div>
          <div class="planhint" id="plan-hint"></div>
          <div style="display:flex;gap:8px;margin-top:14px;">
            <button class="btn sm ghost" id="btn-auto" data-i18n="autoBtn"></button>
            <button class="btn sm ghost" id="btn-clear" data-i18n="clearBtn"></button>
          </div>
        </div>

        <div class="card">
          <h2 data-i18n="orgTitle"></h2>
          <div class="tag" data-i18n="orgHint" style="margin:-6px 0 12px;"></div>
          <div id="org" class="org"></div>
        </div>

        <div class="card">
          <h2 id="buddy-title"></h2>
          <div id="buddy-card" class="buddy-card"></div>
        </div>

        <div class="card">
          <h2 data-i18n="mcTitle"></h2>
          <div class="tag" data-i18n="mcHint" style="margin:-6px 0 12px;"></div>
          <div id="mission-control" class="mission-control"></div>
        </div>

        <div class="card canvascard">
          <div class="goalrow">
            <div class="goalbig" data-i18n="canvasTitle"></div>
            <div class="goaldesc"><b id="c-name"></b></div>
          </div>
          <div class="canvas-grid" id="canvas-grid"></div>
          <div class="conds" id="c-conds"></div>
        </div>

        <div class="card">
          <h2 data-i18n="timelineTitle"></h2>
          <div id="timeline" class="timeline"></div>
        </div>

      </div><!-- /.all-settings-body -->
    </div><!-- /.all-settings -->

    <!-- day-drawer shell (WA ships it; WB animates open/close). #fd-card lives permanently in #dd-body. -->
    <div class="day-drawer" id="day-drawer" role="dialog" aria-modal="false" aria-labelledby="dd-title" aria-hidden="true" tabindex="-1">
      <div class="dd-head" id="dd-head">
        <h2 class="dd-title" id="dd-title"></h2>
        <div class="dd-tabs" id="dd-tabs" role="group" aria-labelledby="dd-title"></div>
        <button class="dd-close" id="dd-close" type="button" aria-controls="dd-body">
          <span aria-hidden="true">×</span><span class="sr-only" data-i18n="ddClose"></span>
        </button>
      </div>
      <div class="dd-body" id="dd-body">
        <div class="card hidden" id="fd-card">
          <div class="fd-card-head">
            <h2 id="fd-title" data-i18n="fdTitle"></h2>
            <button class="btn sm ghost" id="fd-clear-day" data-i18n="clearDayBtn"></button>
          </div>
          <div class="tag" id="fd-hint" data-i18n="fdHint" style="margin:-6px 0 12px;"></div>
          <div class="fd-wrap" id="fd-wrap">
            <div class="fd-deck" id="fd-deck"></div>
            <div class="fd-scroll" id="fd-scroll"><div class="fd-canvas" id="fd-canvas"></div></div>
          </div>
          <div class="dash-lbl" id="fd-arrows-lbl" data-i18n="fdArrowsLbl" style="margin-top:12px;"></div>
          <div class="fd-arrowlist" id="fd-arrowlist"></div>
          <details class="fd-custody hidden" id="fd-custody">
            <summary id="fd-custody-summary" data-i18n="custodySummary"></summary>
            <p data-i18n="custodyHint"></p>
            <div class="fd-custody-body" id="fd-custody-body"></div>
          </details>
          <div class="planready" id="fd-ready"></div>
        </div>
      </div>
    </div>

    </div><!-- /.setup-main -->

    <!-- §W1 ledger rail: after the plan in source order on narrow screens;
         the desktop grid pins it as the sticky right-hand column at ≥1180px. -->
    <aside class="setup-rail" id="rail-setup">
      <div class="card railcard">
        <details class="setup-score-details" id="setup-score-details">
          <summary data-i18n="setupScoreSummary"></summary>
          <div class="rail" id="rail-body"></div>
        </details>
        <button class="btn primary" id="launch" data-i18n="launchBtn"></button>
      </div>
    </aside>
  </section>

  <!-- ============ RUN ============ -->
  <section id="run" class="hidden">
    <div class="runwrap" id="runwrap">
      <div class="run-main">
      <div class="sitemap" id="sitemap">
        <canvas id="stage" aria-hidden="true"></canvas>
        <div class="scene-decor" id="scene-decor" aria-hidden="true"></div>
        <div class="skytint" id="skytint"></div>
        <div class="paths" id="paths"></div>
        <div id="stations"></div>
        <div class="motes" id="motes"></div>
        <div class="figs" id="figs"></div>
        <div class="cascade-pulse" id="cascade-pulse"></div>
        <div class="banner" id="banner"></div>
        <div class="nowtag" id="nowtag"></div>
        <div class="dinnertag hidden" id="dinnertag"></div>
        <div class="fanfare" id="fanfare"></div>
      </div>
      <!-- Canvas pawns must not create an invisible 11-button tab run. app.js can
           remove inert when it supplies an equivalent visible keyboard roster. -->
      <div id="stage-roster" class="sr-only"></div>

      <!-- LIVE MODE dock: cold-open briefing → freeze prompt → spotlight one-question fix → result -->
      <div class="sr-only" id="live-status" role="status" aria-live="polite" aria-atomic="true"></div>
      <div class="live-dock hidden" id="live-dock">
        <div class="ld-panel" id="ld-brief" tabindex="-1"></div>
        <div class="ld-panel" id="ld-prompt" tabindex="-1"></div>
        <div class="ld-panel" id="ld-spot" tabindex="-1"></div>
        <div class="ld-panel" id="ld-result" tabindex="-1"></div>
      </div>

      <div class="legend" id="legend"></div>
      <details class="run-options" id="run-options">
        <summary data-i18n="runOptionsSummary"></summary>
        <div class="run-options-body">
          <span class="sr-only" id="pace-switch-label" data-i18n="paceLabel"></span>
          <div class="pace-switch" role="group" aria-labelledby="pace-switch-label">
            <button class="pace on" id="pace-events" type="button" data-pace="events" data-i18n="paceEvents"></button>
            <button class="pace" id="pace-full" type="button" data-pace="full" data-i18n="paceFull"></button>
          </div>
          <p class="muted2" id="pace-description" data-i18n="paceEventsDesc"></p>
          <div class="speedrow" role="group" aria-labelledby="speed-label"><span class="muted2" id="speed-label" data-i18n="speedLbl"></span>
            <button class="spd" data-spd="0.5" aria-pressed="false">0.5×</button>
            <button class="spd on" data-spd="1" aria-pressed="true">1×</button>
            <button class="spd" data-spd="2" aria-pressed="false">2×</button>
            <button class="spd" data-spd="4" aria-pressed="false">4×</button>
            <button class="spd" data-spd="8" aria-pressed="false">8×</button>
          </div>
        </div>
      </details>

      <div class="controls">
        <button class="btn" id="btn-pause" type="button"></button>
        <button class="btn ghost" id="btn-guests" type="button" aria-controls="stage" aria-pressed="false"></button>
        <button class="btn ghost" id="btn-drawer" type="button" aria-controls="dashboard" aria-expanded="true"></button>
        <button class="btn ghost" id="btn-quit" type="button" data-i18n="quitBtn"></button>
      </div>

      <div class="logbox" id="logbox"></div>
      </div><!-- /.run-main -->

      <!-- Keep the live prompt and run controls before this dashboard in source
           order; the desktop grid still pins the dashboard beside the map. -->
      <aside class="dashboard" id="dashboard">
        <div class="dash-head"><span class="dash-day" id="dash-day"></span><span class="dash-phase" id="dash-phase"></span></div>
        <div class="dash-sec">
          <div class="dash-lbl" data-i18n="railLbl"></div>
          <div class="bigreadout"><span id="dash-ready">100</span><span class="rail-of">/ 100</span></div>
          <div class="rail-rows" id="rail-run"></div>
        </div>
        <div class="dash-sec hidden" id="dash-fd">
          <div class="dash-lbl" id="dash-eff-lbl" data-i18n="effLbl"></div>
          <div class="bigreadout"><span id="dash-eff">100%</span></div>
          <div class="meter"><div class="bar"><i id="dash-eff-bar"></i></div></div>
          <div class="fd-idletxt" id="dash-idle"></div>
          <div class="meter idlemeter"><div class="bar"><i id="dash-idle-bar"></i></div></div>
        </div>
        <div class="dash-sec">
          <div class="dash-lbl" data-i18n="budgetLbl"></div>
          <div class="meter"><div class="top"><span id="dash-budget-txt"></span></div><div class="bar"><i id="dash-budget-bar"></i></div></div>
        </div>
        <div class="dash-sec">
          <div class="dash-lbl" data-i18n="warningsLbl"></div>
          <div id="dash-warnings" class="warnings"></div>
        </div>
        <div class="dash-sec">
          <div class="dash-lbl" data-i18n="perfLbl"></div>
          <div id="dash-perf" class="perfwrap"></div>
        </div>
      </aside>

    </div>
  </section>

  <!-- ============ REPORT ============ -->
  <section id="report" class="hidden" tabindex="-1">
    <!-- §HarborComplete S3: report-on-stage — the same harbor at dusk. Stall markers glow where the
         day actually lost time (each is a click-through to the fixing surface); the grade lands as a
         hanko stamp. #report-stage's canvas + local rAF are created by bootReportStage() and
         DESTROYED by killReportStage() (enterScreen), never merely hidden. -->
    <div class="report-stage-panel" id="report-stage-panel">
      <div class="report-stage-wrap" id="report-stage-wrap">
        <canvas id="report-stage" role="img"></canvas>
        <div class="plan-chip rs-chip" id="rs-chip"></div>
        <div class="rs-note hidden" id="rs-note"></div>
        <div class="rs-markers" id="rs-markers"></div>
        <div class="rs-stamp hidden" id="rs-stamp" role="img"></div>
      </div>
      <div id="rs-roster" class="sr-only"></div>
    </div>
    <div class="card report">
      <div class="grade-wrap">
        <div class="muted" id="r-grade-label" data-i18n="gradeLbl"></div>
        <div class="grade" id="r-grade">0 / 100</div>
        <div class="r-badge" id="r-badge"></div>
        <div class="verdict" id="r-verdict"></div>
      </div>
      <div class="conds" id="r-conds"></div>
      <div class="report-takeaway hidden" id="learning-takeaway"></div>
    </div>
    <details class="card report-disclosure" id="report-score-details">
      <summary data-i18n="reportScoreSummary"></summary>
      <div class="report-disclosure-body"><div class="rail" id="rail-report"></div></div>
    </details>
    <details class="card learning-debrief-card report-disclosure" id="learning-debrief-card">
      <summary data-i18n="debriefTitle"></summary>
      <div class="report-disclosure-body" id="learning-debrief"></div>
    </details>
    <details class="card report-disclosure" id="report-ledger-details">
      <summary id="ledger-title"></summary>
      <div class="report-disclosure-body">
        <div class="tag" style="margin:0 0 12px;"><a href="rubric.html" target="_blank" rel="noopener" data-i18n="rubricLink"></a></div>
        <div class="ledger" id="ledger"></div>
      </div>
    </details>
    <div class="card"><h2 data-i18n="fixpackTitle"></h2><div class="fixpack" id="fixpack"></div></div>
    <details class="card report-disclosure" id="report-individuals-details">
      <summary data-i18n="individualsTitle"></summary>
      <div class="report-disclosure-body"><div class="indivwrap"><table class="indiv" id="individuals"></table></div></div>
    </details>
    <div style="display:flex;gap:8px;">
      <button class="btn" id="btn-tweak" style="flex:1;" data-i18n="editBtn"></button>
      <button class="btn primary" id="btn-again" style="flex:1;" data-i18n="againBtn"></button>
    </div>
  </section>
</div>

<!-- ============ TRAY TEACHING TOAST (wrong-target rejection copy) ============ -->
<div class="tray-toast hidden" id="tray-toast" role="status" aria-live="assertive"></div>

<!-- ============ PROBLEM DETAIL PANEL ============ -->
<div class="modal" id="detail-modal">
  <div class="sheet inspect-sheet" role="dialog" aria-modal="true" aria-labelledby="detail-title">
    <div class="inspect-head"><div class="ins-ic" id="detail-ic">🔍</div>
      <div><h2 id="detail-title"></h2><div class="ins-sub" id="detail-sub"></div></div></div>
    <div id="detail-body"></div>
    <div class="foot"><button class="btn" id="detail-close" data-i18n="closeBtn"></button></div>
  </div>
</div>

<!-- ============ ARROW EDIT PANEL (fishday handoffs) ============ -->
<div class="modal" id="arrow-modal">
  <div class="sheet inspect-sheet" role="dialog" aria-modal="true" aria-labelledby="ar-title">
    <div class="inspect-head"><div class="ins-ic">📨</div>
      <div><h2 id="ar-title"></h2><div class="ins-sub" id="ar-sub"></div></div></div>
    <div id="ar-body"></div>
    <div class="foot" style="display:flex;justify-content:space-between;">
      <button class="btn sm ghost" id="ar-delete" data-i18n="arDelete"></button>
      <button class="btn" id="ar-close" data-i18n="closeBtn"></button>
    </div>
  </div>
</div>

<!-- ============ CHECKPOINT INSPECTOR (fishday 関所) ============ -->
<div class="modal" id="inspect-modal">
  <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="insp-title">
    <h2 id="insp-title"></h2>
    <div class="tag" id="insp-sub" style="margin-bottom:12px;"></div>
    <div id="insp-body" class="insp-body"></div>
    <div class="foot"><button class="btn primary" id="insp-resume" data-i18n="inspResume"></button></div>
  </div>
</div>

<!-- ============ PAWN INSPECTION POPOVER (W3 §3) — non-modal, anchored near a pawn ============ -->
<div class="pawn-card hidden" id="pawn-card" role="dialog" aria-labelledby="pc-name" tabindex="-1"><span class="sr-only" id="pc-name"></span></div>

<!-- ============ TRAY TARGET PICKER (keyboard placement) ============ -->
<div class="modal" id="pick-modal">
  <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="pick-title">
    <h2 id="pick-title"></h2>
    <div class="tag" id="pick-sub" style="margin-bottom:12px;"></div>
    <div id="pick-body" class="pick-body"></div>
    <div class="foot"><button class="btn" id="pick-close" data-i18n="closeBtn"></button></div>
  </div>
</div>

<!-- ============ RULES ============ -->
<div class="modal" id="rules-modal">
  <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="rules-title">
    <h2 id="rules-title" tabindex="-1" data-i18n="rulesTitle"></h2>
    <div id="rules-body"></div>
    <div class="foot"><button class="btn" id="rules-close" data-i18n="closeBtn"></button></div>
  </div>
</div>

<!-- ============ PREDICT BEFORE RUN ============ -->
<div class="modal" id="prediction-modal">
  <div class="sheet prediction-sheet" role="dialog" aria-modal="true" aria-labelledby="prediction-title" aria-describedby="prediction-prompt">
    <h2 id="prediction-title" data-i18n="predictionTitle"></h2>
    <p class="tag" id="prediction-prompt" data-i18n="predictionPrompt"></p>
    <fieldset class="prediction-causes" id="prediction-causes">
      <legend data-i18n="predictionRootLabel"></legend>
      <label><input type="radio" name="prediction-root" value="missing-info"><span data-i18n="causeMissingInfo"></span></label>
      <label><input type="radio" name="prediction-root" value="late-info"><span data-i18n="causeLateInfo"></span></label>
      <label><input type="radio" name="prediction-root" value="authority"><span data-i18n="causeAuthority"></span></label>
      <label><input type="radio" name="prediction-root" value="capacity"><span data-i18n="causeCapacity"></span></label>
      <label><input type="radio" name="prediction-root" value="resource"><span data-i18n="causeResource"></span></label>
    </fieldset>
    <label class="prediction-rationale" for="prediction-rationale"><span data-i18n="predictionWhyLabel"></span>
      <textarea id="prediction-rationale" rows="3" maxlength="240" data-i18n-placeholder="predictionWhyPlaceholder"></textarea>
    </label>
    <div class="form-error hidden" id="prediction-error" role="alert" data-i18n="predictionError"></div>
    <div class="foot prediction-foot">
      <button class="btn ghost" type="button" id="prediction-cancel" data-i18n="predictionCancel"></button>
      <button class="btn primary" type="button" id="prediction-run" data-i18n="predictionRun"></button>
    </div>
  </div>
</div>

<script src="engine.js"></script>
<script src="i18n.js"></script>
<script src="sprites.js"></script>
<script src="stage.js"></script>
<script src="sound.js"></script>
<script src="app.js"></script>
</body>
</html>
