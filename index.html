<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ogasawara Rehearsal · 実行前シミュレーター</title>
<meta name="description" content="Rehearse a project before you run it: set roles, authority, info, budget and report routes, press Run, and watch where people stall. Fix the gaps, re-run toward 100. Bilingual EN/JP.">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">

  <!-- ============ HEADER ============ -->
  <div class="topbar">
    <div class="brand">
      <div class="brand-seal" aria-hidden="true">祭</div>
      <div class="brand-text">
        <div class="sub" data-i18n="subtitle"></div>
        <h1 data-i18n="title"></h1>
        <div class="tag" data-i18n="tagline"></div>
      </div>
    </div>
    <div class="toprow">
      <div class="modesw" id="modesw">
        <button id="mode-live" class="on" data-mode="live" data-i18n="modeLive"></button>
        <button id="mode-morning" data-mode="morning" data-i18n="modeMorning"></button>
      </div>
      <div class="row2">
        <div class="lang">
          <button id="lang-en" class="on" data-lang="en">English</button>
          <button id="lang-ja" data-lang="ja">日本語</button>
        </div>
        <button class="btn sm ghost" id="rules-open" data-i18n="rulesBtn"></button>
      </div>
    </div>
  </div>

  <!-- ============ SETUP ============ -->
  <section id="setup">
    <div class="card canvascard">
      <div class="goalrow">
        <div class="goalbig" data-i18n="canvasTitle"></div>
        <div class="goaldesc"><b id="c-name"></b></div>
      </div>
      <div class="canvas-grid" id="canvas-grid"></div>
      <div class="conds" id="c-conds"></div>
    </div>

    <div class="card">
      <h2 data-i18n="orgTitle"></h2>
      <div class="tag" data-i18n="orgHint" style="margin:-6px 0 12px;"></div>
      <div id="org" class="org"></div>
    </div>

    <div class="card">
      <h2 data-i18n="timelineTitle"></h2>
      <div id="timeline" class="timeline"></div>
    </div>

    <div class="card">
      <h2 data-i18n="mcTitle"></h2>
      <div class="tag" data-i18n="mcHint" style="margin:-6px 0 12px;"></div>
      <div id="mission-control" class="mission-control"></div>
    </div>

    <div class="card">
      <h2 data-i18n="designTitle"></h2>
      <div class="tag" data-i18n="designHint" style="margin:-6px 0 12px;"></div>
      <div id="day-select" class="day-select"></div>
      <div id="tracker" class="tracker"></div>
      <div class="ed-head" id="ed-head"></div>
      <div id="editors" class="editors"></div>
      <div class="planready" id="plan-ready"></div>
      <div class="planhint" id="plan-hint"></div>
      <div style="display:flex;gap:8px;margin-top:14px;">
        <button class="btn sm ghost" id="btn-auto" data-i18n="autoBtn"></button>
        <button class="btn sm ghost" id="btn-clear" data-i18n="clearBtn"></button>
      </div>
    </div>

    <div class="card hidden" id="fd-card">
      <div class="fd-card-head">
        <h2 id="fd-title" data-i18n="fdTitle"></h2>
        <button class="btn sm ghost" id="fd-clear-day" data-i18n="clearDayBtn"></button>
      </div>
      <div class="tag" id="fd-hint" data-i18n="fdHint" style="margin:-6px 0 12px;"></div>
      <div class="fd-wrap" id="fd-wrap">
        <div class="fd-deck" id="fd-deck"></div>
        <div class="fd-scroll" id="fd-scroll"><div class="fd-canvas" id="fd-canvas"></div></div>
      </div>
      <div class="dash-lbl" id="fd-arrows-lbl" data-i18n="fdArrowsLbl" style="margin-top:12px;"></div>
      <div class="fd-arrowlist" id="fd-arrowlist"></div>
      <div class="planready" id="fd-ready"></div>
      <div class="planhint" id="fd-projected"></div>
    </div>

    <button class="btn primary" id="launch" style="width:100%;height:48px;font-size:16px;" data-i18n="launchBtn"></button>
  </section>

  <!-- ============ RUN ============ -->
  <section id="run" class="hidden">
    <div class="runwrap" id="runwrap">
      <div class="sitemap" id="sitemap">
        <canvas id="stage"></canvas>
        <div class="skytint" id="skytint"></div>
        <div class="paths" id="paths"></div>
        <div id="stations"></div>
        <div class="motes" id="motes"></div>
        <div class="figs" id="figs"></div>
        <div class="cascade-pulse" id="cascade-pulse"></div>
        <div class="banner" id="banner"></div>
        <div class="nowtag" id="nowtag"></div>
        <div class="dinnertag hidden" id="dinnertag"></div>
        <div class="fanfare" id="fanfare"></div>
      </div>
      <div id="stage-roster" class="sr-only" aria-live="polite"></div>
      <aside class="dashboard" id="dashboard">
        <div class="dash-head"><span class="dash-day" id="dash-day"></span><span class="dash-phase" id="dash-phase"></span></div>
        <div class="dash-sec">
          <div class="dash-lbl" data-i18n="overallLbl"></div>
          <div class="bigreadout"><span id="dash-ready">100%</span></div>
          <div class="meter"><div class="bar"><i id="dash-ready-bar"></i></div></div>
        </div>
        <div class="dash-sec hidden" id="dash-fd">
          <div class="dash-lbl" data-i18n="effLbl"></div>
          <div class="bigreadout"><span id="dash-eff">100%</span></div>
          <div class="meter"><div class="bar"><i id="dash-eff-bar"></i></div></div>
          <div class="fd-idletxt" id="dash-idle"></div>
          <div class="meter idlemeter"><div class="bar"><i id="dash-idle-bar"></i></div></div>
        </div>
        <div class="dash-sec">
          <div class="dash-lbl" data-i18n="budgetLbl"></div>
          <div class="meter"><div class="top"><span id="dash-budget-txt"></span></div><div class="bar"><i id="dash-budget-bar"></i></div></div>
        </div>
        <div class="dash-sec">
          <div class="dash-lbl" data-i18n="warningsLbl"></div>
          <div id="dash-warnings" class="warnings"></div>
        </div>
        <div class="dash-sec">
          <div class="dash-lbl" data-i18n="perfLbl"></div>
          <div id="dash-perf" class="perfwrap"></div>
        </div>
      </aside>
    </div>

    <!-- LIVE MODE dock: cold-open briefing → freeze prompt → spotlight one-question fix → result -->
    <div class="live-dock hidden" id="live-dock" aria-live="polite">
      <div class="ld-panel" id="ld-brief"></div>
      <div class="ld-panel" id="ld-prompt"></div>
      <div class="ld-panel" id="ld-spot"></div>
      <div class="ld-panel" id="ld-result"></div>
    </div>

    <div class="legend" id="legend"></div>
    <div class="speedrow"><span class="muted2" data-i18n="speedLbl"></span>
      <button class="spd" data-spd="0.5">0.5×</button>
      <button class="spd on" data-spd="1">1×</button>
      <button class="spd" data-spd="2">2×</button>
    </div>

    <div class="controls">
      <button class="btn" id="btn-pause"></button>
      <button class="btn ghost" id="btn-guests"></button>
      <button class="btn ghost" id="btn-drawer"></button>
      <button class="btn ghost" id="btn-quit" data-i18n="quitBtn"></button>
    </div>

    <div class="logbox" id="logbox"></div>
  </section>

  <!-- ============ REPORT ============ -->
  <section id="report" class="hidden">
    <div class="card report">
      <div class="grade-wrap">
        <div class="muted" data-i18n="gradeLbl"></div>
        <div class="grade" id="r-grade">B</div>
        <div class="r-badge" id="r-badge"></div>
        <div class="verdict" id="r-verdict"></div>
      </div>
      <div class="conds" id="r-conds"></div>
    </div>
    <div class="card"><h2 data-i18n="scorecardTitle"></h2><div class="scorecard" id="scorecard"></div></div>
    <div class="card"><h2 data-i18n="fixpackTitle"></h2><div class="tag" data-i18n="fixpackHint" style="margin:-6px 0 12px;"></div><div class="fixpack" id="fixpack"></div></div>
    <div class="card"><h2 data-i18n="individualsTitle"></h2><div class="indivwrap"><table class="indiv" id="individuals"></table></div></div>
    <div style="display:flex;gap:8px;">
      <button class="btn" id="btn-tweak" style="flex:1;" data-i18n="editBtn"></button>
      <button class="btn primary" id="btn-again" style="flex:1;" data-i18n="againBtn"></button>
    </div>
  </section>
</div>

<!-- ============ PROBLEM DETAIL PANEL ============ -->
<div class="modal" id="detail-modal">
  <div class="sheet inspect-sheet" role="dialog" aria-modal="true" aria-labelledby="detail-title">
    <div class="inspect-head"><div class="ins-ic" id="detail-ic">🔍</div>
      <div><h2 id="detail-title"></h2><div class="ins-sub" id="detail-sub"></div></div></div>
    <div id="detail-body"></div>
    <div class="foot"><button class="btn" id="detail-close" data-i18n="closeBtn"></button></div>
  </div>
</div>

<!-- ============ ARROW EDIT PANEL (fishday handoffs) ============ -->
<div class="modal" id="arrow-modal">
  <div class="sheet inspect-sheet" role="dialog" aria-modal="true" aria-labelledby="ar-title">
    <div class="inspect-head"><div class="ins-ic">📨</div>
      <div><h2 id="ar-title"></h2><div class="ins-sub" id="ar-sub"></div></div></div>
    <div id="ar-body"></div>
    <div class="foot" style="display:flex;justify-content:space-between;">
      <button class="btn sm ghost" id="ar-delete" data-i18n="arDelete"></button>
      <button class="btn" id="ar-close" data-i18n="closeBtn"></button>
    </div>
  </div>
</div>

<!-- ============ CHECKPOINT INSPECTOR (fishday 関所) ============ -->
<div class="modal" id="inspect-modal">
  <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="insp-title">
    <h2 id="insp-title"></h2>
    <div class="tag" id="insp-sub" style="margin-bottom:12px;"></div>
    <div id="insp-body" class="insp-body"></div>
    <div class="foot"><button class="btn primary" id="insp-resume" data-i18n="inspResume"></button></div>
  </div>
</div>

<!-- ============ RULES ============ -->
<div class="modal" id="rules-modal">
  <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="rules-title">
    <h2 id="rules-title" data-i18n="rulesTitle"></h2>
    <div id="rules-body"></div>
    <div class="foot"><button class="btn" id="rules-close" data-i18n="closeBtn"></button></div>
  </div>
</div>

<script src="engine.js"></script>
<script src="i18n.js"></script>
<script src="stage.js"></script>
<script src="app.js"></script>
</body>
</html>
